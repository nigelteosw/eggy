version: 2
server:
  listen: ":8080"
  public_base_url: "https://eggy.example.com"
  telegram_webhook_path: "/webhooks/telegram"
data_dir: "/data"
telegram:
  owner_id: 123456789
agent:
  # Telegram: /model changes the active alias; /model default restores this one.
  default_model: "deepseek-pro"
providers:
  deepseek:
    adapter: "openai_compatible"
    base_url: "https://api.deepseek.com"
    # This names an environment variable. Never place the key itself in YAML.
    api_key_env: "DEEPSEEK_API_KEY"
models:
  deepseek-pro:
    provider: "deepseek"
    model: "deepseek-v4-pro"
repositories:
  - name: "eggy"
    clone_url: "https://github.com/nigelteosw/eggy.git"
    base_branch: "main"
    protected_branches: ["main"]
runner:
  root: "/data/runs"
  timeout: "45m"
  retention: "30m"
  max_output_bytes: 1048576
  allowed_env: ["PATH", "LANG", "LC_ALL", "TERM"]
implementation_sessions:
  context_budget_chars: 96000
  recent_messages: 16
  output_excerpt_chars: 8192
scheduler:
  heartbeat_cadence: "30m"
  quiet_hours:
    start: "22:00"
    end: "07:00"
    timezone: "Asia/Singapore"
  minimum_proactive_interval: "2h"
  weekly_proactive_limit: 5
calendar:
  enabled: true
  # Default for mutations when no calendar ID is supplied; general reads cover all non-hidden readable calendars.
  default_calendar: "primary"
  timezone: "Asia/Singapore"
